<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nonton Film</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'Segoe UI',Arial,sans-serif;overflow:hidden}

.video-wrap{position:relative;width:100%;max-width:480px;aspect-ratio:9/16;background:#000;border-radius:12px;overflow:hidden;box-shadow:0 0 30px rgba(0,0,0,0.8)}
.video-wrap video{width:100%;height:100%;object-fit:cover}

/* Top bar */
.top-bar{position:absolute;top:0;left:0;width:100%;padding:12px 16px;display:flex;align-items:center;gap:10px;z-index:5;background:linear-gradient(180deg,rgba(0,0,0,0.8),transparent)}
.back-btn{color:#fff;font-size:20px;cursor:pointer;background:none;border:none}
.top-title{color:#fff;font-size:14px;font-weight:700}

/* Progress bar */
.progress-bar{position:absolute;top:0;left:0;height:3px;background:linear-gradient(90deg,#ff3c5f,#ff7b8a);z-index:12;transition:width 1s linear}

/* Center play */
.play-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:4;cursor:pointer;display:none}
.play-center svg{width:60px;height:60px;fill:rgba(255,255,255,0.9);filter:drop-shadow(0 2px 8px rgba(0,0,0,0.5))}

/* Bottom bar */
.bottom-bar{position:absolute;bottom:0;left:0;width:100%;padding:16px;z-index:5;background:linear-gradient(0deg,rgba(0,0,0,0.8),transparent)}
.film-title{color:#fff;font-size:15px;font-weight:700;margin-bottom:4px}
.film-meta{color:#aaa;font-size:11px;margin-bottom:10px}
.btn-row{display:flex;gap:10px}
.btn-ad{flex:1;padding:12px;background:linear-gradient(135deg,#ff3c5f,#ff1a40);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;transition:all .3s;box-shadow:0 4px 15px rgba(255,60,95,0.4)}
.btn-ad:hover{transform:translateY(-2px)}
.btn-share{padding:12px 16px;background:rgba(255,255,255,0.15);border:none;border-radius:10px;color:#fff;cursor:pointer;font-size:14px}

/* Age Confirmation - sesuai gambar */
.age-overlay{position:absolute;top:0;left:0;width:100%;height:100%;z-index:20;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);background:rgba(0,0,0,0.3)}
.age-overlay.hidden{display:none}
.age-box{background:#fff;border-radius:14px;padding:28px 24px 20px;width:85%;max-width:320px;box-shadow:0 8px 40px rgba(0,0,0,0.25);animation:fadeIn 0.3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.age-box h3{color:#222;font-size:1.05rem;font-weight:700;margin-bottom:10px;text-align:left}
.age-box p{color:#555;font-size:0.82rem;line-height:1.5;margin-bottom:22px;text-align:left}
.age-btns{display:flex;gap:10px;justify-content:flex-end}
.age-btn-cancel{padding:10px 24px;background:#e8e8e8;border:none;border-radius:8px;color:#333;font-size:0.85rem;font-weight:600;cursor:pointer;transition:all .2s}
.age-btn-cancel:hover{background:#ddd}
.age-btn-continue{padding:10px 24px;background:#e04050;border:none;border-radius:8px;color:#fff;font-size:0.85rem;font-weight:600;cursor:pointer;transition:all .2s;box-shadow:0 2px 10px rgba(224,64,80,0.3)}
.age-btn-continue:hover{background:#d03040;transform:translateY(-1px)}

/* Ad Popup */
.popup-overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:10;display:none;align-items:center;justify-content:center;backdrop-filter:blur(6px)}
.popup-overlay.show{display:flex}
.popup{background:linear-gradient(135deg,#1a1a2e,#16213e);border:1px solid rgba(255,60,95,0.3);border-radius:16px;padding:28px 24px;text-align:center;max-width:300px;width:85%;animation:fadeIn 0.3s ease}
.popup .icon{font-size:2.5rem;margin-bottom:10px}
.popup h3{color:#fff;font-size:1.1rem;margin-bottom:6px}
.popup p{color:#888;font-size:0.78rem;margin-bottom:18px;line-height:1.4}
.popup .btn-continue{display:block;width:100%;padding:14px;background:linear-gradient(135deg,#ff3c5f,#ff1a40);color:#fff;border:none;border-radius:12px;font-size:0.95rem;font-weight:700;cursor:pointer;transition:all .3s;margin-bottom:10px;box-shadow:0 4px 20px rgba(255,60,95,0.4)}
.popup .btn-continue:hover{transform:translateY(-2px)}
.popup .btn-close{background:transparent;border:1px solid rgba(255,255,255,0.15);color:#666;padding:10px;border-radius:10px;cursor:pointer;font-size:0.78rem;width:100%;transition:all .3s}
.popup .btn-close:hover{border-color:rgba(255,255,255,0.3);color:#999}
</style>
</head>
<body>

<div class="video-wrap">
  <!-- GANTI URL VIDEO DI SINI -->
  <video id="mainVideo" autoplay muted loop playsinline>
    <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
  </video>

  <div class="progress-bar" id="progressBar"></div>

  <div class="top-bar">
    <button class="back-btn">&#8249;</button>
    <span class="top-title">Now Playing</span>
  </div>

  <div class="play-center" id="playCenter" onclick="togglePlay()">
    <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
  </div>

  <div class="bottom-bar">
    <div class="film-title">Film Title</div>
    <div class="film-meta">2026 &#183; 120 min &#183; HD &#183; Sub Indo</div>
    <div class="btn-row">
      <button class="btn-ad" onclick="goAd()">&#9654; Nonton Sekarang</button>
      <button class="btn-share">&#128279;</button>
    </div>
  </div>

  <!-- AGE CONFIRMATION -->
  <div class="age-overlay" id="ageOverlay">
    <div class="age-box">
      <h3>Konfirmasi Usia</h3>
      <p>Video ini mengandung konten dewasa. Apakah Anda berusia di atas 18 tahun dan ingin melanjutkan?</p>
      <div class="age-btns">
        <button class="age-btn-cancel" onclick="ageCancel()">BATAL</button>
        <button class="age-btn-continue" onclick="ageConfirm()">LANJUT</button>
      </div>
    </div>
  </div>

  <!-- AD POPUP -->
  <div class="popup-overlay" id="popupOverlay">
    <div class="popup">
      <div class="icon">&#127916;</div>
      <h3>Nonton Full Film</h3>
      <p>Klik tombol di bawah untuk menonton film lengkap tanpa batas</p>
      <button class="btn-continue" onclick="goAd()">LANJUTKAN NONTON &#9654;</button>
      <button class="btn-close" onclick="closePopup()">Nanti saja</button>
    </div>
  </div>
</div>

<script>
// LINK ADSTERRA KAMU
var AD_LINK = "https://www.effectivecpmnetwork.com/yxkuhhqn?key=0f78e13d9d75b537e38e1597d1db88b7";

function goAd() {
  window.open(AD_LINK, "_blank");
}

// AGE CONFIRMATION
var video = document.getElementById('mainVideo');
var ageOverlay = document.getElementById('ageOverlay');
var popupTimer;

video.pause();

function ageConfirm() {
  ageOverlay.classList.add('hidden');
  video.play();
  startPopupTimer();
}

function ageCancel() {
  goAd();
}

// POPUP TIMER (3 detik)
var POPUP_INTERVAL = 3;

function showPopup() {
  document.getElementById('popupOverlay').classList.add('show');
  video.pause();
}

function closePopup() {
  document.getElementById('popupOverlay').classList.remove('show');
  video.play();
  clearInterval(popupTimer);
  startPopupTimer();
}

function startPopupTimer() {
  var bar = document.getElementById('progressBar');
  bar.style.width = '0%';
  var elapsed = 0;

  popupTimer = setInterval(function() {
    elapsed += 100;
    bar.style.width = Math.min((elapsed / (POPUP_INTERVAL * 1000)) * 100, 100) + '%';
    if (elapsed >= POPUP_INTERVAL * 1000) {
      clearInterval(popupTimer);
      showPopup();
    }
  }, 100);
}

// PLAY/PAUSE
var playCenter = document.getElementById('playCenter');

function togglePlay() {
  if (video.paused) { video.play(); playCenter.style.display = 'none'; }
  else { video.pause(); playCenter.style.display = 'block'; }
}

document.querySelector('.video-wrap').addEventListener('click', function(e) {
  if (e.target.closest('.popup') || e.target.closest('.bottom-bar') || e.target.closest('.top-bar') || e.target.closest('.age-overlay')) return;
  togglePlay();
});

video.addEventListener('pause', function() { playCenter.style.display = 'block'; });
video.addEventListener('play', function() { playCenter.style.display = 'none'; });
</script>

</body>
</html>
