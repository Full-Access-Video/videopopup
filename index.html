<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nonton Video</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:Arial,sans-serif;overflow:hidden}

.video-wrap{position:relative;width:100%;max-width:480px;aspect-ratio:9/16;background:#000;border-radius:12px;overflow:hidden;box-shadow:0 0 30px rgba(0,0,0,0.8)}
.video-wrap video{width:100%;height:100%;object-fit:cover}

/* Top bar */
.top-bar{position:absolute;top:0;left:0;width:100%;padding:12px 16px;display:flex;align-items:center;gap:10px;z-index:5;background:linear-gradient(180deg,rgba(0,0,0,0.7),transparent)}
.avatar{width:36px;height:36px;border-radius:50%;border:2px solid #ff3c5f;object-fit:cover}
.user-info .name{color:#fff;font-size:13px;font-weight:700}
.user-info .live-tag{display:inline-block;padding:2px 8px;background:#ff3c5f;border-radius:4px;font-size:10px;color:#fff;font-weight:700;margin-top:2px}
.viewers{margin-left:auto;color:#fff;font-size:12px;display:flex;align-items:center;gap:4px}
.viewers .dot{width:6px;height:6px;background:#ff3c5f;border-radius:50%;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}

/* Progress bar */
.progress-bar{position:absolute;top:0;left:0;height:3px;background:linear-gradient(90deg,#ff3c5f,#ff7b8a);z-index:6;transition:width 1s linear}

/* Chat overlay */
.chat-overlay{position:absolute;bottom:70px;left:10px;width:calc(100% - 20px);max-height:200px;overflow:hidden;z-index:4}
.chat-msg{background:rgba(0,0,0,0.4);backdrop-filter:blur(8px);padding:6px 12px;border-radius:20px;color:#fff;font-size:12px;margin-bottom:6px;width:fit-content;max-width:85%;animation:slideUp 0.3s ease}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.chat-msg .user{color:#ff7b8a;font-weight:700}

/* Bottom controls */
.controls{position:absolute;bottom:0;left:0;width:100%;padding:10px 16px;display:flex;align-items:center;gap:12px;z-index:5;background:linear-gradient(0deg,rgba(0,0,0,0.7),transparent)}
.input-fake{flex:1;padding:10px 16px;background:rgba(255,255,255,0.15);border:none;border-radius:25px;color:#fff;font-size:13px;outline:none}
.ctrl-btn{width:36px;height:36px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform 0.2s}
.ctrl-btn:hover{transform:scale(1.15)}

/* Popup overlay */
.popup-overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.75);z-index:10;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.popup-overlay.show{display:flex}
.popup{background:linear-gradient(135deg,#1a1a2e,#16213e);border:1px solid rgba(255,60,95,0.3);border-radius:16px;padding:28px 24px;text-align:center;max-width:300px;width:85%;animation:popIn 0.3s ease}
@keyframes popIn{from{transform:scale(0.8);opacity:0}to{transform:scale(1);opacity:1}}
.popup .icon{font-size:2.5rem;margin-bottom:10px}
.popup h3{color:#fff;font-size:1.1rem;margin-bottom:6px}
.popup p{color:#888;font-size:0.78rem;margin-bottom:18px;line-height:1.4}
.popup .btn-continue{display:block;width:100%;padding:14px;background:linear-gradient(135deg,#ff3c5f,#ff1a40);color:#fff;border:none;border-radius:12px;font-size:0.95rem;font-weight:700;cursor:pointer;transition:all .3s;text-decoration:center;margin-bottom:10px;box-shadow:0 4px 20px rgba(255,60,95,0.4)}
.popup .btn-continue:hover{transform:translateY(-2px);box-shadow:0 6px 30px rgba(255,60,95,0.6)}
.popup .btn-close{background:transparent;border:1px solid rgba(255,255,255,0.15);color:#666;padding:10px;border-radius:10px;cursor:pointer;font-size:0.78rem;width:100%;transition:all .3s}
.popup .btn-close:hover{border-color:rgba(255,255,255,0.3);color:#999}
.popup .timer-text{color:#555;font-size:0.65rem;margin-top:8px}

/* Heart animation */
.heart-float{position:absolute;font-size:1.5rem;z-index:3;animation:heartUp 2s ease forwards;pointer-events:none}
@keyframes heartUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-200px) scale(0.5)}}
</style>
</head>
<body>

<div class="video-wrap">
  <!-- VIDEO - GANTI URL INI DENGAN VIDEO KAMU -->
  <video id="mainVideo" autoplay muted loop playsinline>
    <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
  </video>

  <!-- Progress bar -->
  <div class="progress-bar" id="progressBar"></div>

  <!-- Top bar -->
  <div class="top-bar">
    <img class="avatar" src="https://i.pravatar.cc/100?img=5" alt="">
    <div class="user-info">
      <div class="name">LiveStream</div>
      <div class="live-tag">LIVE</div>
    </div>
    <div class="viewers"><span class="dot"></span> 1.2K</div>
  </div>

  <!-- Chat -->
  <div class="chat-overlay" id="chatOverlay"></div>

  <!-- Bottom controls -->
  <div class="controls">
    <input class="input-fake" placeholder="Kirim pesan..." readonly>
    <button class="ctrl-btn" style="background:linear-gradient(135deg,#ff3c5f,#ff7b8a)" onclick="showPopup()">&#10084;</button>
  </div>

  <!-- POPUP ADSTERRA -->
  <div class="popup-overlay" id="popupOverlay">
    <div class="popup">
      <div class="icon">&#127916;</div>
      <h3>Nonton Full Video</h3>
      <p>Klik tombol di bawah untuk melanjutkan menonton video tanpa batas</p>
      <button class="btn-continue" onclick="goAd()">LANJUTKAN NONTON &#9654;</button>
      <button class="btn-close" onclick="closePopup()">Nanti saja</button>
      <div class="timer-text">Popup ini muncul setiap 15 detik</div>
    </div>
  </div>
</div>

<script>
// ============================
// LINK ADSTERRA KAMU
// ============================
var AD_LINK = "https://www.effectivecpmnetwork.com/yxkuhhqn?key=0f78e13d9d75b537e38e1597d1db88b7";

function goAd() {
  window.open(AD_LINK, "_blank");
}

// ============================
// POPUP TIMER (setiap 15 detik)
// Ubah angka 15 untuk ganti interval
// ============================
var POPUP_INTERVAL = 15; // detik
var popupTimer;

function showPopup() {
  document.getElementById('popupOverlay').classList.add('show');
  // Pause video saat popup muncul
  // document.getElementById('mainVideo').pause();
}

function closePopup() {
  document.getElementById('popupOverlay').classList.remove('show');
  // Resume video
  // document.getElementById('mainVideo').play();
  // Reset timer
  clearInterval(popupTimer);
  startPopupTimer();
}

function startPopupTimer() {
  // Progress bar
  var bar = document.getElementById('progressBar');
  bar.style.width = '0%';
  var elapsed = 0;
  var interval = 100; // ms
  var step = (interval / (POPUP_INTERVAL * 1000)) * 100;

  popupTimer = setInterval(function() {
    elapsed += interval;
    bar.style.width = Math.min((elapsed / (POPUP_INTERVAL * 1000)) * 100, 100) + '%';
    if (elapsed >= POPUP_INTERVAL * 1000) {
      clearInterval(popupTimer);
      showPopup();
    }
  }, interval);
}

// Start pertama kali
startPopupTimer();

// ============================
// CHAT SIMULATION
// ============================
var chats = [
  {user: "Andi", text: "keren banget 🔥"},
  {user: "Sari", text: "gila sih ini"},
  {user: "Budi", text: "lanjut terus kak"},
  {user: "Maya", text: "😍😍😍"},
  {user: "Rizal", text: "dari mana kak?"},
  {user: "Dina", text: "subcribe ya guys"},
  {user: "Fajar", text: "wow mantap"},
  {user: "Lestari", text: "salam dari Jakarta ❤️"},
  {user: "Agung", text: "gokil abis"},
  {user: "Nisa", text: "ajarin dong kak"},
  {user: "Tono", text: "the best lah"},
  {user: "Rina", text: "request lagu dong 🎵"},
  {user: "Yoga", text: "auto nonton terus"},
  {user: "Wati", text: "kapan live lagi?"},
  {user: "Hendra", text: "mantul 🔥🔥🔥"}
];
var chatBox = document.getElementById('chatOverlay');
var chatIdx = 0;

setInterval(function() {
  if (chatIdx < chats.length) {
    var div = document.createElement('div');
    div.className = 'chat-msg';
    div.innerHTML = '<span class="user">' + chats[chatIdx].user + ':</span> ' + chats[chatIdx].text;
    chatBox.appendChild(div);
    // Hapus chat lama biar gak numpuk
    if (chatBox.children.length > 6) chatBox.removeChild(chatBox.children[0]);
    chatIdx++;
  } else {
    chatIdx = 0; // ulang
  }
}, 2000);

// ============================
// DOUBLE TAP HEART
// ============================
var wrap = document.querySelector('.video-wrap');
wrap.addEventListener('dblclick', function(e) {
  for (var i = 0; i < 5; i++) {
    var heart = document.createElement('div');
    heart.className = 'heart-float';
    heart.textContent = '❤️';
    heart.style.left = (e.offsetX - 10 + Math.random() * 40) + 'px';
    heart.style.bottom = '80px';
    heart.style.animationDelay = (i * 0.1) + 's';
    wrap.appendChild(heart);
    setTimeout(function(el) { el.remove(); }, 2000, heart);
  }
});

// ============================
// SINGLE TAP = PLAY/PAUSE
// ============================
var video = document.getElementById('mainVideo');
var taps = 0;
var tapTimer;

wrap.addEventListener('click', function(e) {
  // Jangan trigger kalau klik popup/controls
  if (e.target.closest('.popup') || e.target.closest('.controls') || e.target.closest('.top-bar')) return;
  taps++;
  if (taps === 1) {
    tapTimer = setTimeout(function() {
      taps = 0;
      video.paused ? video.play() : video.pause();
    }, 250);
  } else if (taps === 2) {
    clearTimeout(tapTimer);
    taps = 0;
  }
});
</script>

</body>
</html>
